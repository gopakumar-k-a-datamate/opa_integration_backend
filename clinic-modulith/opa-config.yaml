services:
  clinic_api:
    url: http://host.docker.internal:8082

bundles:
  clinical_bundle:
    service: clinic_api
    resource: /internal/authz/bundle/clinical
    polling:
      min_delay_seconds: 10
      max_delay_seconds: 20
  
  billing_bundle:
    service: clinic_api
    resource: /internal/authz/bundle/billing
    polling:
      min_delay_seconds: 10
      max_delay_seconds: 20

default_authorization_decision: false

# Custom property read by OpaRestTemplateAdapter
# Clinic-modulith uses %s so the adapter can dynamically route to /clinical or /billing namespaces
evaluation_url: http://localhost:8182/v1/data/app/authz/%s/allow
