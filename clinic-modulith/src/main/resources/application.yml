server:
  port: 8082

spring:
  application:
    name: clinic-modulith
  datasource:
    url: jdbc:postgresql://localhost:5434/clinic_db
    username: clinic_user
    password: clinic_password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
