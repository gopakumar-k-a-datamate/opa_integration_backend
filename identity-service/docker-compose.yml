services:
  db:
    image: postgres:16-alpine
    container_name: identity-db
    restart: unless-stopped

    ports:
      - "5435:5432"

    environment:
      POSTGRES_DB: identity_db
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: